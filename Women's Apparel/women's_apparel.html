<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Weather Enthusiast Official Merch Store - All Products</title>
  
  <style>
    /* Native CSS Resets & Foundations */
        * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      -webkit-font-smoothing: antialiased;
    }

    /* 1. Announcement Bar Styles */
    .announcement-bar {
      background-color: #2f00ff;
      color: #000000;
      text-align: center;
      padding: 13px 0;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

/* Add this class inside your <style> tags */
.hidden {
  display: none !important;
} 

    /* 2. Header Layout Styles */
    .navbar {
      background-color: #ffffff;
      border-bottom: 1px solid #f3f4f6;
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 0 10px;
    }
    /* Update your navigation styling rules with these exact parameters */
.navbar-container {
  max-width: 100%;       /* Expands the top bar across the full screen width */
  margin: 0 auto;
  height: 96px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 32px;       /* Adds neat padding to the outer edges */
  gap: 24px;              /* Adds a small gap between the logo and the navigation links */
}
    .logo {
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-size: 28px;
      font-style: italic;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      text-decoration: none;
      color: #000000;
    }
.nav-links {
  display: flex;
  gap: 30px;             /* Reduces space between words slightly so they fit cleanly */
  white-space: nowrap;   /* CRITICAL: Force text to stay on one single horizontal line */
  flex-wrap: nowrap;     /* Blocks items from wrapping down to a second row */
  margin-right: auto;  /* Pushes the navigation links to the left side of the bar */
  margin-left: auto;   /* Centers the navigation links in the bar */
  padding-right: 20px;
}

.nav-links a {
  font-size: 13px;       /* Drop font size down slightly so long titles sit beautifully */
  font-weight: 500;
  color: #1f2937;
  text-decoration: none;
  letter-spacing: 0.01em;
}

    .nav-links a:hover {
      color: #000000;
    }
    .nav-utilities {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 14px;
      font-weight: 500;
    }
    .currency-selector {
      display: flex;
      align-items: center;
      cursor: pointer;
    }
    .currency-selector svg {
      width: 14px;
      height: 14px;
      margin-left: 4px;
      margin-top: 2px;
    }
    .cart-icon {
      color: #000000;
      display: flex;
      align-items: center;
      transition: opacity 0.15s ease;
    }
    .cart-icon:hover {
      opacity: 0.7;
    }

    /* 3. Main Product Page Panel Split */
    .main-layout {
      max-width: 1400px;
      margin: 0 auto;
      padding: 56px 48px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 64px;
    }
    @media (min-width: 1024px) {
      .main-layout {
        grid-template-columns: repeat(12, minmax(0, 1fr));
      }
    }

    /* Left Side Presenter */
    .image-column {
      grid-column: span 12;
      background-color: #EBEBEB;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      aspect-ratio: 1 / 1;
      width: 100%;
    }
    @media (min-width: 1024px) {
      .image-column {
        grid-column: span 6;
      }
    }
    .image-column img {
      max-height: 85%;
      max-width: 85%;
      object-fit: contain;
    }

    /* Right Side Options configuration */
    .details-column {
      grid-column: span 12;
      display: flex;
      flex-direction: column;
      padding-top: 4px;
    }
    @media (min-width: 1024px) {
      .details-column {
        grid-column: span 6;
      }
    }
    .product-title {
      font-size: 38px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .product-price {
      font-size: 20px;
      font-weight: 400;
      color: #6b7280;
      margin-bottom: 32px;
    }

    /* Color Selection Elements */
    .section-label {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: #6b7280;
      display: block;
      margin-bottom: 12px;
    }
    .color-container {
      margin-bottom: 28px;
    }
    .color-dots-row {
      display: flex;
      gap: 14px;
    }
    .color-dot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid transparent;
      cursor: pointer;
      outline: none;
    }
    .color-dot.active {
      outline: 1px solid #000000;
      outline-offset: 2px;
    }

    /* Size Selector Matrix Elements */
    .size-container {
      margin-bottom: 40px;
    }
    .size-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .size-guide-link {
      font-size: 12px;
      color: #6b7280;
      text-decoration: underline;
    }
    .size-guide-link:hover {
      color: #000000;
    }
    .sizes-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }
    @media (min-width: 640px) {
      .sizes-grid {
        grid-template-columns: repeat(9, minmax(0, 1fr));
      }
    }
    .size-box {
      border: 1px solid #e5e7eb;
      background: #ffffff;
      padding: 12px 0;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      border-radius: 2px;
      cursor: pointer;
      transition: border-color 0.15s ease;
    }
    .size-box:hover {
      border-color: #000000;
    }
    .size-box.active {
      border-color: #000000;
      background-color: #ffffff;
      font-weight: 700;
    }

    /* Add To Cart Button Form Action */
    .add-to-cart-btn {
      width: 100%;
      background-color: #2f00ff;
      color: #FFFFFF;
      border: none;
      height: 54px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      transition: background-color 0.15s ease, transform 0.1s ease;
    }
    .add-to-cart-btn:hover {
      background-color: #1f029e;
    }
    .add-to-cart-btn:active {
      transform: scale(0.99);
    }
    /* Paste this block inside the <style> tags of your broken sub-page file */

/* 1. Set up the structural row container for the layout layout */
.catalog-container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 56px 48px;
}

.catalog-title {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 40px;
}

/* 2. CRITICAL: Force the browser to place cards side-by-side instead of in a vertical list */
.products-grid {
  display: grid;
  grid-template-columns: repeat(1, minmax(0, 1fr));
  gap: 32px;
}

/* On standard computer monitors, split into a 3-column horizontal layout */
@media (min-width: 1024px) {
  .products-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}

/* 3. Style individual card components to look clean and neat */
.product-card {
  text-decoration: none;
  color: #000000;
  display: flex;
  flex-direction: column;
}

/* The light gray square container box for images */
.card-image-box {
  background-color: #EBEBEB;
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  margin-bottom: 16px;
  width: 100%;
}

.card-image-box img {
  max-height: 85%;
  max-width: 85%;
  object-fit: contain;
}

.card-name {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 4px;
}

.card-price {
  font-size: 16px;
  color: #6b7280;
}
  </style>
</head>
<body>

  <!-- Top Announcement Bar -->
  <div id="top-announcement" class="announcement-bar"></div>

  <!-- Main Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="logo data-nav-link">THE WEATHER ENTHUSIAST</a>
      
<div class="nav-links">

          <span>USD</span>
          <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg>

          <svg style="width: 22px; height: 22px;" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">

  <!-- Product Catalog Grid -->
<!-- Step A: Place this target grid inside the body of womens_apparel.html -->
<main class="catalog-container">
  <h1 class="catalog-title">Women's Apparel</h1>
  <div id="womens-products-grid" class="products-grid"></div>
</main>

  <script>
document.addEventListener("DOMContentLoaded", function() {
  // 1. Announcement Bar Check
  const bar = document.getElementById("top-announcement");
  if (bar && (!bar.textContent || bar.textContent.trim() === "")) {
    bar.classList.add("hidden");
  }

  // 2. Folder-Safe Navigation Guard Logic
  const currentPath = window.location.pathname.split("/").pop() || "womens_apparel.html";
  const navLinks = document.querySelectorAll(".data-nav-link");

  navLinks.forEach(link => {
    const targetFile = link.getAttribute("href").split("/").pop();
    if (currentPath === targetFile) {
      link.style.color = "#000000"; link.style.fontWeight = "600"; link.style.cursor = "default"; link.style.pointerEvents = "none";
      link.addEventListener("click", function(event) { event.preventDefault(); });
    }
  });

  // 3. GENERATE 9 DISTINCT WOMEN'S APPAREL ITEM PAGE LINKS
  const womensItems = [
    { id: 1, name: "Women's Weather Track Jacket #1", price: "$30.95", img: "https://rawpixel.com", link: "womens_track_jacket_1.html" },
    { id: 2, name: "Women's Hailinator Premium Tee #2", price: "$31.95", img: "https://rawpixel.com", link: "womens_premium_tee_2.html" },
    { id: 3, name: "Women's Velocity Pullover Hoodie #3", price: "$32.95", img: "https://rawpixel.com", link: "womens_pullover_hoodie_3.html" },
    { id: 4, name: "Women's Classic Storm Polo #4", price: "$33.95", img: "https://rawpixel.com", link: "womens_storm_polo_4.html" },
    { id: 5, name: "Women's Everyday Windbreaker #5", price: "$34.95", img: "https://rawpixel.com", link: "womens_everyday_windbreaker_5.html" },
    { id: 6, name: "Women's Cyclone Graphic Tee #6", price: "$35.95", img: "https://rawpixel.com", link: "womens_cyclone_tee_6.html" },
    { id: 7, name: "Women's Thermofleece Vest #7", price: "$36.95", img: "https://rawpixel.com", link: "womens_thermofleece_vest_7.html" },
    { id: 8, name: "Women's Active Weather Crewneck #8", price: "$37.95", img: "https://rawpixel.com", link: "womens_weather_crewneck_8.html" },
    { id: 9, name: "Women's Horizon Premium Pullover #9", price: "$38.95", img: "https://rawpixel.com", link: "womens_premium_pullover_9.html" }
  ];

  const gridContainer = document.getElementById("womens-products-grid");
  if (gridContainer) {
    gridContainer.innerHTML = womensItems.map(item => `
      <a href="${item.link}" class="product-card">
        <div class="card-image-box"><img src="${item.img}" alt="${item.name}" /></div>
        <div class="card-name">${item.name}</div>
        <div class="card-price">${item.price}</div>
      </a>
    `).join('');
  }
});
  </script>
</body>
